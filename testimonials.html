<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Aymen | Testimonials</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f7f6;
            color: #333;
            overflow-x: hidden; 
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 5rem 2rem;
            text-align: center;
        }

        .heading {
            font-size: 3.5rem;
            color: #250641;
            margin-bottom: 5rem;
        }

        .heading span { color: #ff4757; }

        .box-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .box {
            background: #fff;
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: left;
            transition: 0.3s;
        }

        .box:hover { transform: translateY(-10px); }

        .user { display: flex; align-items: center; gap: 1.5rem; margin-top: 2rem; }
        .user img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #250641; }
        
        .back-btn {
            display: inline-block;
            margin-top: 5rem;
            padding: 1rem 2.5rem;
            background: #250641;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.6rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="heading" data-aos="fade-down">Client <span>Testimonials</span></h1>
        
        <div class="box-container">
            <div class="box" data-aos="fade-right" data-aos-duration="1000">
                <p>"Mohamed is a very talented developer. Great experience!"</p>
                <div class="user">
                    <img src="https://i.pravatar.cc/100?u=1">
                    <div class="info"><h3>Akram</h3><span>Developer</span></div>
                </div>
            </div>

            <div class="box" data-aos="fade-up" data-aos-duration="1200">
                <p>"Very disciplined and professional in his work."</p>
                <div class="user">
                    <img src="https://i.pravatar.cc/100?u=2">
                    <div class="info"><h3>Sarah</h3><span>Designer</span></div>
                </div>
            </div>

            <div class="box" data-aos="fade-left" data-aos-duration="1400">
                <p>"His Python skills are top-notch. Highly recommended."</p>
                <div class="user">
                    <img src="https://i.pravatar.cc/100?u=3">
                    <div class="info"><h3>Alex</h3><span>Manager</span></div>
                </div>
            </div>
        </div>

        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
       
        AOS.init({
            offset: 100,     
            duration: 1000,   
            easing: 'ease-in-out',
            once: false,    
        });
    </script>
</body>
</html>
